ai_usage_summary: |
  Used ChatGPT for problem understanding, submission guidance,
  and debugging support during development. No AI model is used
  in the final ranking pipeline or during inference.

methodology_summary: |
  The solution is a deterministic rule-based ranking system that combines
  four major signals: skill relevance, career/title relevance,
  behavioral signals, and experience. Skill scores are computed using
  weighted matching against core, bonus, and foundation skills.
  Career scores are derived from current job titles relevant to search,
  recommendation, NLP, AI, and machine learning roles. Behavioral
  signals include recruiter interest, response rate, GitHub activity,
  notice period, and open-to-work indicators. Experience is scored to
  favor candidates within the target experience range. Final ranking is
  generated using weighted score aggregation and candidates are sorted
  to produce the Top 100 submission. The approach is fully CPU-based,
  reproducible, and does not require network access during ranking.

