ai_usage_summary: |
  Used AI-assisted brainstorming, architecture exploration,
  debugging support, and implementation review.
  Final ranking logic was implemented, verified, and tested
  against the provided challenge dataset.

methodology_summary: |
  Candidate ranking system using a weighted combination of:
  skill relevance, career relevance, behavioral signals,
  and experience. Skill scoring prioritizes retrieval,
  search, ranking, vector database, and LLM-related skills.
  Career scoring rewards highly relevant AI and search titles,
  while behavioral signals capture recruiter engagement and
  candidate responsiveness. The final score is used to rank
  candidates and generate the top 100 recommendations.

